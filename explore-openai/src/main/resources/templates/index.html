<!DOCTYPE html>
<html>
<head>
<title>AI Memory Hook Teacher 🧠</title>

<style>
body {
    margin: 0;
    font-family: "Poppins", system-ui;
    background: linear-gradient(135deg, #fde2ff, #e0f2fe);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    width: 420px;
    height: 80vh;
    background: white;
    border-radius: 25px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.1);
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

.header {
    padding: 15px;
    text-align: center;
    font-weight: bold;
    font-size: 18px;
    background: linear-gradient(135deg, #a855f7, #ec4899);
    color: white;
    position: relative;
}

.clear-btn {
    position: absolute;
    right: 10px;
    top: 10px;
    background: white;
    color: #a855f7;
    border: none;
    padding: 5px 10px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 12px;
}

.chat {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
}

.message {
    max-width: 75%;
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.4;
    animation: fadeIn 0.3s ease-in-out;
}

.user {
    background: #a855f7;
    color: white;
}

.bot {
    background: #f3f4f6;
    color: #1e293b;
}

.input-box {
    display: flex;
    padding: 12px;
    border-top: 1px solid #eee;
}

input {
    flex: 1;
    padding: 10px;
    border-radius: 12px;
    border: 1px solid #ddd;
    outline: none;
}

button {
    margin-left: 10px;
    padding: 10px 16px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, #a855f7, #ec4899);
    color: white;
    cursor: pointer;
}

.loading {
    font-size: 13px;
    color: gray;
    margin-bottom: 10px;
}

.dots::after {
    content: "...";
    animation: dots 1.5s steps(3, end) infinite;
}

@keyframes dots {
    0% { content: ""; }
    33% { content: "."; }
    66% { content: ".."; }
    100% { content: "..."; }
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="header">
        🧠 AI Memory Hook Teacher
        <button class="clear-btn" onclick="clearChat()">Clear</button>
    </div>

    <div class="chat" id="chat"></div>

    <div class="input-box">
    <input id="input" placeholder="Ask any topic... 💭"/>
    <button onclick="startListening()">🎤</button>
    <button onclick="send()">Send</button>
</div>

</div>

<script>

window.onload = () => {
    addMessage("Hey 👋 I’ll teach you anything with simple explanation + memory tricks!", "bot");

    document.getElementById("input").addEventListener("keypress", function(e) {
        if (e.key === "Enter") {
            send();
        }
    });
};

async function send() {

    const input = document.getElementById("input");
    const button = document.querySelector(".input-box button");

    const text = input.value.trim();
    if (!text) return;

    button.disabled = true;
    input.disabled = true;

    addMessage(text, "user");
    input.value = "";

    const loader = addLoading();

    try {
        const res = await fetch("/ai/ask", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ topic: text })
        });

        if (!res.ok) throw new Error("Server error");

        const data = await res.json();

        loader.remove();

        const responseText = `
            <b>Explanation:</b><br>${data.explanation || "No explanation"}<br><br>
            <b>Memory Hook:</b><br>${data.hook || "No hook"}
        `;

        addMessage(responseText, "bot");

        // 🔊 Browser TTS
        const fullText = (data.explanation || "") + ". " + (data.hook || "");
        speak(fullText);

    } catch (e) {
        loader.remove();
        addMessage("⚠️ Something went wrong.", "bot");
    } finally {
        button.disabled = false;
        input.disabled = false;
        input.focus();
    }
}

function addMessage(text, type) {
    const chat = document.getElementById("chat");

    const wrapper = document.createElement("div");
    wrapper.style.display = "flex";
    wrapper.style.alignItems = "flex-start";
    wrapper.style.marginBottom = "10px";
    wrapper.style.gap = "8px";

    const avatar = document.createElement("div");
    avatar.innerText = type === "user" ? "👩‍💻" : "🤖";
    avatar.style.fontSize = "18px";

    const bubble = document.createElement("div");
    bubble.className = "message " + type;
    bubble.innerHTML = text;

    if (type === "user") {
        wrapper.style.justifyContent = "flex-end";
        wrapper.appendChild(bubble);
        wrapper.appendChild(avatar);
    } else {
        wrapper.appendChild(avatar);
        wrapper.appendChild(bubble);
    }

    chat.appendChild(wrapper);
    chat.scrollTop = chat.scrollHeight;
}

function addLoading() {
    const chat = document.getElementById("chat");

    const div = document.createElement("div");
    div.className = "loading";
    div.innerHTML = "🤖 typing<span class='dots'></span>";

    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;

    return div;
}

async function clearChat() {
    if (!confirm("Clear chat?")) return;

    document.getElementById("chat").innerHTML = "";

    await fetch("/ai/clear", { method: "POST" });
}

function speak(text) {
    if (!text) return;

    const speech = new SpeechSynthesisUtterance(text);
    speech.lang = "en-US";
    speech.rate = 0.95;
    speech.pitch = 1;

    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(speech);
}
function startListening() {

    if (!('webkitSpeechRecognition' in window)) {
        alert("Speech recognition not supported in this browser");
        return;
    }

    const recognition = new webkitSpeechRecognition();

    recognition.lang = "en-US";
    recognition.interimResults = false;

    recognition.start();

    recognition.onstart = () => {
        console.log("Listening 🎤...");
    };

    recognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript;
        console.log("You said:", transcript);

        document.getElementById("input").value = transcript;

        // auto send (optional)
        send();
    };

    recognition.onerror = (event) => {
        console.error("Mic error:", event.error);
        alert("Mic error: " + event.error);
    };
    recognition.onend = () => {
    console.log("Stopped listening");
};
}

</script>

</body>
</html>
