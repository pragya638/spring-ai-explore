<!DOCTYPE html>
<html>
<head>
<title>AI Memory Hook Teacher</title>

<style>
  body {
    background: linear-gradient(135deg, #fdf2f8, #ede9fe);
    font-family: system-ui;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #1e293b;
}

.card {
    width: 420px;
    background: #ffffff;
    padding: 28px;
    border-radius: 20px;
    box-shadow: 0 25px 50px rgba(88,28,135,0.15);
}

textarea {
    width: 100%;
    height: 80px;
    padding: 16px;
    border-radius: 14px;
    border: 1px solid #ddd6fe;
    font-size: 16px;
    line-height: 1.5;
    background: #faf5ff;
    color: #1e293b;
    resize: none;
    box-sizing: border-box;
}


textarea::placeholder {
    color: #7c3aed;
}

button {
    margin-top: 16px;
    width: 100%;
    padding: 14px;
    border-radius: 14px;
    border: none;
    background: linear-gradient(135deg, #a855f7, #ec4899);
    color: white;
    font-weight: 600;
    font-size: 16px;
    cursor: pointer;
}

.output {
    margin-top: 18px;
    padding: 14px;
    border-radius: 12px;
    background: #fdf4ff;
    color: #4c1d95;
    font-size: 15px;
    display: none;
}

.status {
    margin-top: 10px;
    font-size: 13px;
    color: #6b21a8;
    text-align: center;
    display: none;
}
.loading {
    margin-top: 14px;
    font-size: 14px;
    color: #7c3aed;
    text-align: center;
    display: none;
}


</style>
</head>

<body>

<div class="card">
    <h2>🧠 AI Memory Hook Teacher</h2>

    <textarea id="prompt"
        placeholder="Ask any topic… e.g. Stack, Queue, OSI layers"></textarea>

    <button onclick="generate()">Generate & Speak</button>
<div class="loading" id="loading">⏳ Generating memory hook…</div>

    <!-- AI spoken text -->
    <div class="output" id="output"></div>

    <div class="status" id="status">🔊 Speaking…</div>

    <audio id="audio"></audio>
</div>

<script>
async function generate() {
    const topic = document.getElementById("prompt").value.trim();
    if (!topic) return alert("Please type a topic");

    const audio = document.getElementById("audio");
    const output = document.getElementById("output");
    const loading = document.getElementById("loading");
    const button = document.querySelector("button");
    const textarea = document.getElementById("prompt");

    // UI → loading state
    button.disabled = true;
    textarea.disabled = true;
    loading.style.display = "block";
    output.style.display = "none";

    try {
        // 1️⃣ Get memory hook text
        const textRes = await fetch(
            `/ai/memory-hook?topic=${encodeURIComponent(topic)}`
        );
        const hookText = await textRes.text();

        // show text immediately
        output.innerText = `"${hookText}"`;
        output.style.display = "block";

        // 2️⃣ Get audio & speak immediately
        const audioRes = await fetch(
            `/ai-teacher/speak?topic=${encodeURIComponent(topic)}`
        );

        const blob = await audioRes.blob();
        audio.src = URL.createObjectURL(blob);
        audio.play();

    } catch (e) {
        alert("Something went wrong");
    } finally {
        
        loading.style.display = "none";
        button.disabled = false;
        textarea.disabled = false;
    }
}
</script>


</body>
</html>
